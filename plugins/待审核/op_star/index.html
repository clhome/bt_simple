<style>
.overflow_hide {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: inline-block;
    vertical-align: middle;
}

.cur {
    background-color: #20a53a;
    color: #fff;
}

/* WAF UI styles */
.lib-con-title {
    height: 30px;
    border-bottom: #eee 1px solid;
    margin-bottom: 15px;
    width: 100%;
}

.lib-con-title span {
    font-weight: bold;
    font-size: 14px;
    float: left;
    color: #333;
}

.lib-con {
    margin-bottom: 15px;
    width: 100%;
}

.rule_btn button {
    margin: 10px 5px;
}

.table td {
    word-break: break-all;
}

.screen {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    border: none;
    padding: 20px;
    float: left;
    border-radius: 8px;
    margin-top: 5px;
    margin-bottom: 15px;
    width: 100%;
    color: #fff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.screen .line {
    width: 25%;
    text-align: center;
    float: left;
    position: relative;
}

.screen .line:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 15%;
    height: 70%;
    width: 1px;
    background: rgba(255,255,255,0.2);
}

.screen .line .name {
    display: block;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
}

.screen .line .val {
    font-size: 24px;
    display: block;
    font-weight: bold;
    color: #fff;
}

.wafview-head {
    height: 35px;
    border-bottom: #eee 1px solid;
    margin-bottom: 15px;
}

.soft-man-con .CodeMirror {
    height: 350px;
}

.help-info-text {
    margin-top: 15px;
    background: #fdfaf2;
    border-left: 4px solid #f0ad4e;
    padding: 10px 15px;
    border-radius: 4px;
    color: #8a6d3b;
    font-size: 13px;
}

.help-info-text li {
    list-style: decimal;
    margin-left: 15px;
    line-height: 20px;
}

.card-box {
    background: #fff;
    border-radius: 6px;
    border: 1px solid #e5e5e5;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02);
}
</style>
