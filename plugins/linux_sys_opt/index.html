<div class="bt-form">
	<div class="bt-w-main">
		<div class="bt-w-menu">
			<p class="bgw" onclick="optStatus();">优化状态</p>
			<p onclick="readme();">插件说明</p>
		</div>
		<div class="bt-w-con pd15">
			<div class="soft-man-con"></div>
		</div>
	</div>
</div>

<script type="text/javascript">
resetPluginWinHeight(580);

function optStatus() {
    $('.bgw').removeClass('bgw');
    $('.bt-w-menu p:eq(0)').addClass('bgw');
    var loadT = layer.msg('正在获取服务器参数状态...', { icon: 16, time: 0, shade: 0.3 });
    
    requestPlugin('linux_sys_opt', 'get_status', '', function (rdata) {
        layer.close(loadT);
        if (!rdata.status) {
            layer.msg(rdata.msg, { icon: 2 });
            return;
        }
        var data = rdata.data;
        var con = `<div class="p-3">
            <h3 style="margin-bottom: 15px;">内核与并发参数状态</h3>
            <div style="height: 400px; overflow-y: auto;">
                <table class="table table-hover table-bordered" style="font-size: 13px;">
                    <thead>
                        <tr>
                            <th>参数名</th>
                            <th>作用描述</th>
                            <th>当前值</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>vm.swappiness</td><td>优先使用物理内存</td><td>${data.vm_swappiness}</td></tr>
                        <tr><td>vm.dirty_background_ratio</td><td>平滑刷盘，防止IO卡顿</td><td>${data.vm_dirty_background_ratio}</td></tr>
                        <tr><td>vm.dirty_ratio</td><td>限制脏页比例上限</td><td>${data.vm_dirty_ratio}</td></tr>
                        <tr><td>net.core.somaxconn</td><td>TCP监听队列上限</td><td>${data.net_core_somaxconn}</td></tr>
                        <tr><td>vm.max_map_count</td><td>最大VMA数量</td><td>${data.vm_max_map_count}</td></tr>
                        <tr><td>fs.file-max</td><td>系统最大文件描述符</td><td>${data.fs_file_max}</td></tr>
                        <tr><td>net.ipv4.tcp_tw_reuse</td><td>TIME-WAIT socket 复用</td><td>${data.net_ipv4_tcp_tw_reuse}</td></tr>
                        <tr><td>net.ipv4.ip_local_port_range</td><td>外连端口范围</td><td>${data.net_ipv4_ip_local_port_range}</td></tr>
                        <tr><td>net.ipv4.tcp_max_syn_backlog</td><td>SYN backlog 大小</td><td>${data.net_ipv4_tcp_max_syn_backlog}</td></tr>
                        <tr><td>net.ipv4.tcp_max_tw_buckets</td><td>TIME_WAIT 保持上限</td><td>${data.net_ipv4_tcp_max_tw_buckets}</td></tr>
                        <tr><td>THP (透明巨页)</td><td>开启可能导致数据库卡顿</td><td>${data.thp_enabled}</td></tr>
                    </tbody>
                </table>
            </div>
            <div style="margin-top: 15px; text-align: center;">
                <button class="btn btn-success btn-sm" onclick="applyOpt()">一键全局优化</button>
            </div>
        </div>`;
        $('.soft-man-con').html(con);
    });
}

function applyOpt() {
    layer.confirm('确定要一键应用推荐的内核与并发参数优化吗？<br><br><span style="color:red;">应用后立即生效，此操作将提升高并发及数据库运行性能。</span>', {title: '系统优化提示'}, function(index) {
        layer.close(index);
        var loadT = layer.msg('正在执行内核及 THP 优化，请稍候...', { icon: 16, time: 0, shade: 0.3 });
        requestPlugin('linux_sys_opt', 'apply_opt', '', function (rdata) {
            layer.close(loadT);
            layer.msg(rdata.msg, { icon: rdata.status ? 1 : 2 });
            if(rdata.status){
                setTimeout(function(){
                    optStatus();
                }, 1500);
            }
        });
    });
}

function readme() {
    $('.bgw').removeClass('bgw');
    $('.bt-w-menu p:eq(1)').addClass('bgw');
    var con = `<div class="p-3" style="line-height: 24px; font-size: 14px;">
        <h3 style="margin-bottom: 15px;">关于御风 Linux 系统优化插件</h3>
        <p>本插件整合了业界最佳实践，主要用于对标准 Linux 系统（支持 CentOS/RHEL/Debian/Ubuntu 体系）进行全方位的性能优化。</p>
        <p><b>主要优化包括：</b></p>
        <ul>
            <li>降低 Swap 倾向以防止 OOM，改善磁盘 IO 及脏页刷新平滑度。</li>
            <li>提升内核的网络并发承载能力（Somaxconn, TCP TIME_WAIT 复用，本地端口范围等）。</li>
            <li>全面扩大系统文件描述符上限（fs.file-max），告别 Too many open files。</li>
            <li>提升单个进程允许的最大内存映射区域数，充分满足 Elasticsearch 和其他大型数据库需求。</li>
            <li>一键彻底禁用 Transparent Huge Pages (THP)，兼容各种发行版，防止高负载下数据库（如 Redis, MySQL 等）发生周期性卡顿现象。</li>
        </ul>
        <br>
        <p><i>注：本插件执行的优化符合绝大部分 Web 场景和 DB 场景，可放心一键套用。</i></p>
    </div>`;
    $('.soft-man-con').html(con);
}

// 初始化加载
optStatus();
</script>
