<div class='line' style='margin-top:15px;display:flex;align-items:center;'>
    <span style='margin-right:15px;'>安装方式：</span>
    <label style='font-weight:normal;cursor:pointer;margin-bottom:0;display:flex;align-items:center;'><input type='radio' name='mysql_install_type' value='fast' checked='checked' style='margin:0 5px 0 0;' /> 极速安装(Tar)</label>
    <label style='font-weight:normal;cursor:pointer;margin-left:15px;margin-bottom:0;display:flex;align-items:center;'><input type='radio' name='mysql_install_type' value='compile' style='margin:0 5px 0 0;' /> 源码编译</label>
</div>
<div style='margin-top:20px;background:#f5f6fa;border-left:4px solid #20a53a;padding:12px 15px;border-radius:2px;'>
    <div id='mysql_install_tips_fast'>
        <p style='margin-bottom:5px;font-weight:bold;color:#333;font-size:14px;'>极速安装 <span style='font-weight:normal;color:#888;font-size:12px;'>(预计 1~3 分钟)</span></p>
        <p style='margin-bottom:0;color:#666;font-size:13px;line-height:1.5;'>直接部署官方预编译的通用二进制包，省时省力。适合绝大多数日常应用场景、快速部署及低配置服务器。</p>
    </div>
    <div id='mysql_install_tips_compile' style='display:none;'>
        <p style='margin-bottom:5px;font-weight:bold;color:#333;font-size:14px;'>源码编译 <span style='font-weight:normal;color:#888;font-size:12px;'>(预计 20~60 分钟)</span></p>
        <p style='margin-bottom:0;color:#666;font-size:13px;line-height:1.5;'>根据当前服务器硬件与系统环境进行深度优化编译。适合配置较高、对数据库性能有极致要求的生产环境。</p>
    </div>
</div>

<script>
    $("input[name='mysql_install_type']").on('change', function() {
        if ($(this).val() === 'compile') {
            $('#mysql_install_tips_compile').show();
            $('#mysql_install_tips_fast').hide();
        } else {
            $('#mysql_install_tips_compile').hide();
            $('#mysql_install_tips_fast').show();
        }
    });

    window.install_hook_mysql = function(version) {
        var install_method = $("input[name='mysql_install_type']:checked").val();
        if (install_method === "fast") {
            return version + "-fast";
        }
        return version;
    };
</script>
