<style>
    .mr16 { margin-right: 16px; }
    .jdk-default-badge {
        display: inline-block;
        padding: 2px 6px;
        background-color: #5cb85c;
        color: white;
        border-radius: 4px;
        font-size: 12px;
        margin-left: 8px;
    }
    .jdk-type {
        color: #888;
        font-size: 12px;
    }
</style>
<div class="bt-w-main">
    <div class="bt-w-menu">
        <p class="bgw">JDK管理</p>
    </div>
    <div id="webEdit-con" class="bt-w-con pd15">
    </div>
</div>
<script type="text/javascript">
    var jdk_manager = {
        plugin_name: 'jdk',
        init: function () {
            var _that = this;
            $(".bt-w-menu p").on('click', function () {
                var i = $(this).index();
                $(this).addClass("bgw").siblings().removeClass("bgw");
                if (i === 0) {
                    _that.render_table();
                }
            });
            $(".bt-w-menu p").eq(0).click()
        },
        send: function (method, args, callback) {
            var loadT = layer.msg('正在获取...', { icon: 16, time: 0, shade: 0.3 });
            var req_data = {
                name: 'jdk',
                func: method,
                args: "'" + JSON.stringify(args || {}) + "'"
            };
            $.post('/plugins/run', req_data, function (data) {
                layer.close(loadT);
                if (!data.status) {
                    layer.msg(data.msg, { icon: 0, time: 2000 });
                    return;
                }
                var rdata;
                try {
                    rdata = JSON.parse(data.data);
                } catch(e) {
                    rdata = data.data;
                }
                if (rdata && typeof rdata === 'object' && rdata.status === false) {
                     layer.msg(rdata.msg, { icon: 2 });
                     return;
                }
                if (typeof callback == 'function') {
                    callback(rdata);
                }
            }, 'json');
        },
        render_table: function () {
            var _that = this;
            this.send('get_jdk_list', {}, function (rdata) {
                var list = rdata.msg || [];
                var tbody = '';
                for (var i = 0; i < list.length; i++) {
                    var row = list[i];
                    var nameHtml = '<span>' + row.name + '</span><span class="jdk-type"> (' + row.type + ')</span>';
                    if (row.is_default) {
                        nameHtml += '<span class="jdk-default-badge">系统默认</span>';
                    }
                    var pathHtml = row.path ? '<a class="bt_success" style="cursor: pointer;" title="点击打开目录" onclick="openPath(\'' + row.path.substring(0, row.path.lastIndexOf('/')) + '\')">' + row.path + '</a>' : '-';
                    
                    var opsHtml = '';
                    // 设为默认
                    if (row.operation == 1 || row.operation == 2 || row.operation == 4) {
                        if (row.is_default) {
                            opsHtml += '<span style="color:#999; margin-right:10px;">已是默认</span>';
                        } else {
                            opsHtml += '<a class="bt_success" style="cursor: pointer; margin-right:10px;" onclick="jdk_manager.set_default(\'' + row.path + '\', \'' + row.name + '\')">设为默认</a>';
                        }
                    }
                    
                    // 安装/卸载
                    if (row.operation == 1) {
                        opsHtml += '<a class="bt_danger" style="cursor: pointer;" onclick="jdk_manager.uninstall(\'' + row.path + '\', \'' + row.type + '\', \'' + row.name + '\')">卸载</a>';
                    } else if (row.operation == 0) {
                        opsHtml += '<a class="bt_success" style="cursor: pointer;" onclick="jdk_manager.install(\'' + row.name + '\', \'' + row.download_url + '\')">安装</a>';
                    } else if (row.operation == 3) {
                        opsHtml += '<span style="color:#e6a23c">正在安装...</span>';
                    } else if (row.operation == 2) {
                        if (row.type === '系统预装') {
                            opsHtml += '<span style="color:#999">系统自带</span>';
                        } else {
                            opsHtml += '<a class="bt_danger" style="cursor: pointer;" onclick="jdk_manager.uninstall(\'' + row.path + '\', \'' + row.type + '\', \'' + row.name + '\')">移除记录</a>';
                        }
                    } else if (row.operation == 4) {
                        opsHtml += '<span style="color:#999">系统自带</span>';
                    } else {
                        opsHtml += '<span>不可操作</span>';
                    }
                    
                    tbody += '<tr><td>' + nameHtml + '</td><td>' + pathHtml + '</td><td style="text-align:right;">' + opsHtml + '</td></tr>';
                }
                
                if (list.length === 0) {
                    tbody = '<tr><td colspan="3" style="text-align:center;">暂无可使用的JDK版本</td></tr>';
                }
                
                var html = '<div class="mb15" style="margin-bottom: 15px;">' +
                                '<button class="btn btn-success btn-sm" onclick="jdk_manager.add_custom()">添加自定义JDK</button>' +
                                '<button class="btn btn-default btn-sm pull-right" onclick="jdk_manager.render_table()">刷新列表</button>' +
                            '</div>' +
                            '<div class="divtable">' +
                                '<table class="table table-hover">' +
                                    '<thead>' +
                                        '<tr>' +
                                            '<th>JDK版本</th>' +
                                            '<th>JDK路径</th>' +
                                            '<th style="text-align:right; width:100px; white-space:nowrap;">操作</th>' +
                                        '</tr>' +
                                    '</thead>' +
                                    '<tbody>' + tbody + '</tbody>' +
                                '</table>' +
                            '</div>';
                $('#webEdit-con').html(html);
            });
        },
        set_default: function(path, name) {
            var _that = this;
            layer.confirm('确认将【' + name + '】设为全局系统默认 JDK 吗？<br>这会修改 /etc/profile.d/java.sh 环境变量配置。', { icon: 3, title: '警告' }, function (index) {
                layer.close(index);
                _that.send('set_default_jdk', { path: path }, function (res) {
                    layer.msg(res.msg, {icon: res.status ? 1 : 2});
                    if(res.status) _that.render_table();
                });
            });
        },
        uninstall: function(path, type, name) {
            var _that = this;
            var isUninstall = (type === '面板安装');
            var msg = isUninstall ? '卸载' : '移除';
            var warning = isUninstall ? '此操作将会删除该 JDK 目录下的所有文件，请确保该 JDK 未被业务占用！' : '仅移除面板记录，不删除文件。';
            layer.confirm('是否' + msg + '【' + name + '】？<br><span style="color: red">' + warning + '</span>', { icon: 3, title: '警告' }, function (index) {
                layer.close(index);
                _that.send('uninstall_jdk', { path: path, type: type }, function (res) {
                    layer.msg(res.msg, {icon: res.status ? 1 : 2});
                    _that.render_table();
                });
            });
        },
        install: function(version, url) {
            var _that = this;
            layer.confirm('确认安装【' + version + '】？<br>将从国内镜像源后台下载并解压。', { icon: 3, title: '提示' }, function (index) {
                layer.close(index);
                _that.send('install_jdk', { version: version, download_url: url }, function (res) {
                    layer.msg(res.msg, {icon: res.status ? 1 : 2});
                    if (res.status) {
                        _that.render_table();
                        if (typeof messageBox === 'function') messageBox();
                    }
                });
            });
        },
        add_custom: function() {
            var _that = this;
            layer.open({
                type: 1,
                btn: ['确认', '取消'],
                title: '添加自定义JDK',
                closeBtn: 2,
                area: '450px',
                content: '<div style="padding:20px;display: flex;align-items: center;">' +
                            '<span style="width: 80px;" >JDK路径：</span>' +
                            '<input class="bt-input-text mr10 file-path" style="width:300px" placeholder="/usr/local/java/jdk1.8.0/bin/java"/>' +
                          '</div>' +
                          '<div style="padding:0 20px 20px 20px; color:#999; font-size:12px;">提示: 请手动输入 java 可执行文件的完整路径。</div>',
                yes: function (index, layero) {
                    var path = $(layero).find('.file-path').val();
                    if (path) {
                        _that.send('add_custom_jdk', { path: path }, function (res) {
                            layer.msg(res.msg, {icon: res.status ? 1 : 2});
                            if (res.status) {
                                layer.close(index);
                                _that.render_table();
                            }
                        });
                    } else {
                        layer.msg('请输入JDK路径', {icon: 2});
                    }
                }
            });
        }
    }
    jdk_manager.init();
</script>
